services:
  api:
    build: ./http
    container_name: tg-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORT=${PORT}
      - NODE_OPTIONS=--max-old-space-size=1024
      - UV_THREADPOOL_SIZE=16
      - MONGO_EXPLAIN=0
      - CACHE_ENABLED=true
      - PARSER_API_USERNAME=${API_USERNAME}
      - PARSER_API_PASSWORD=${API_PASSWORD}
      - USE_MTPROTO=${USE_MTPROTO}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PARSER_INTERNAL_URL=http://parser:3002
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', r => process.exit(r.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bots_bots

  parser:
    build: ./parser
    container_name: tg-parser
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./parser/media:/app/media
    environment:
      - NODE_ENV=production
      - STRING_SESSION=${STRING_SESSION}
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - MEDIA_PATH=${MEDIA_PATH}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - API_BASE_URL=${API_BASE_URL}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
      - STATS_UPDATE_LIMIT=${STATS_UPDATE_LIMIT}
      - REDIS_URL=redis://redis:6379
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
    depends_on:
      api:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bots_bots

  web:
    build:
      context: ./web
      dockerfile: dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: tg-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:80:80'
    depends_on:
      - api
    networks:
      - bots_bots

  mongo:
    image: mongo:7
    container_name: tg-parse-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bots_bots

  mongo-express:
    image: mongo-express:latest
    container_name: tg-parse-mongo-express
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bots_bots

  redis:
    image: redis:7-alpine
    container_name: tg-parse-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bots_bots

networks:
  bots_bots:
    driver: bridge

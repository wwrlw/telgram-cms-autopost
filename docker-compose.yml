services:
  backend:
    build:
      context: ./http
      dockerfile: dockerfile.dev
    container_name: tg-parse-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./parser/media:/app/media
      - ./http:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VITE_API_URL=${VITE_API_URL}
      - PORT=${PORT}
      - NODE_OPTIONS=--max-old-space-size=1024
      - UV_THREADPOOL_SIZE=16
      - DEBUG=fastify:*
      - MONGO_EXPLAIN=0
      - CACHE_ENABLED=true
      - PARSER_API_USERNAME=${API_USERNAME}
      - PARSER_API_PASSWORD=${API_PASSWORD}
      - USE_MTPROTO=${USE_MTPROTO}
      - REDIS_URL=redis://redis:6379
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - bots_bots
  parser:
    build: ./parser
    container_name: tg-parse-parser
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./parser:/app
      - /app/node_modules
      - ./parser/media:/app/media
    command: npm run watch
    environment:
      - NODE_ENV=development
      - STRING_SESSION=${STRING_SESSION}
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - MEDIA_PATH=${MEDIA_PATH}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - API_BASE_URL=${API_BASE_URL}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
      - STATS_UPDATE_LIMIT=${STATS_UPDATE_LIMIT}
      - REDIS_URL=redis://redis:6379
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
    depends_on:
      - backend
    networks:
      - bots_bots
  frontend:
    build:
      context: ./web
      target: dev
      dockerfile: dockerfile
    container_name: tg-parse-frontend
    restart: unless-stopped
    volumes:
      - ./web:/app/
      - /app/node_modules
    ports:
      - '127.0.0.1:5173:5173'
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - bots_bots
  mongo:
    image: mongo:7
    container_name: tg-parse-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./data:/data/db
    networks:
      - bots_bots

  mongo-express:
    image: mongo-express:latest
    container_name: tg-parse-mongo-express
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    networks:
      - bots_bots

  redis:
    image: redis:7-alpine
    ports:
    - "6381:6379"
    container_name: tg-parse-redis
    restart: unless-stopped
    networks:
      - bots_bots

networks:
  bots_bots:
    external: true